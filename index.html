<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>有福温泉 ARIFUKU PASS</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header-container">
      <img src="ロゴ.png" alt="有福温泉" class="top-logo" />
      <div class="header-title">ARIFUKU PASS</div>
    </div>

    <div class="id-card">
      <div class="photo-frame"><img src="有福温泉.JPG" alt="住民写真" /></div>
      <div class="card-info">
        <div class="info-top-row">
          <p class="user-name" id="line-name">ゲスト 様</p>
          <div class="level-badge">
            <span class="level-label" id="user-title">---</span>
            <div class="stars" id="star-display"></div>
          </div>
        </div>
        <div class="level-description" id="level-description">読込中...</div>
        <div id="res-error" class="error-log"></div>
      </div>
    </div>

    <div class="welcome-message">
      有福温泉がもっと楽しくなるコンテンツを集めました！<br />湯ったりとした素敵な1日をお過ごしください。
    </div>

    <div class="time-selection-title">所要時間で選ぶ</div>
    <div class="time-button-container">
      <div class="time-button">〜5分</div>
      <div class="time-button">〜30分</div>
      <div class="time-button">1時間</div>
      <div class="time-button">1時間30分</div>
    </div>

    <div class="section-title">体験メニュー一覧</div>
    <div class="container" id="content-list"><p>読込中...</p></div>
    <div id="list-error" class="error-log" style="max-width: 90%"></div>

    <script src="main.js"></script>
  </body>
</html>
