<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>有福温泉 ARIFUKU PASS</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body { font-family: sans-serif; background-color: #efeee7; margin: 0; padding: 0 0 20px 0; display: flex; flex-direction: column; align-items: center; }
      .header-container { width: 100%; max-width: 90%; display: flex; justify-content: space-between; align-items: center; padding: 15px 0 10px 0; }
      .top-logo { max-width: 60px; height: auto; }
      .header-title { font-size: 1.2rem; font-weight: bold; color: #2d5a4c; text-align: center; flex-grow: 1; margin-right: 60px; }
      
      .id-card { background: #fff; border: 3px solid #000; border-radius: 20px; padding: 15px; width: 100%; max-width: 90%; margin-bottom: 25px; box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.1); box-sizing: border-box; }
      .photo-frame img { width: 100%; border-radius: 10px; border: 2px solid #000; display: block; }
      .card-info { margin-top: 15px; }
      .info-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
      .user-name { font-size: 1.4rem; font-weight: bold; margin: 0; }
      .level-badge { display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #2d5a4c; }
      .level-label { color: #2d5a4c; font-size: 1rem; font-weight: bold; }
      .stars { color: #2d5a4c; font-size: 1rem; }
      .level-description { font-size: 0.85rem; color: #333; margin-top: 8px; line-height: 1.4; }
      
      .welcome-message { width: 100%; max-width: 90%; margin: 10px 0 15px 0; text-align: center; font-size: 0.9rem; line-height: 1.6; color: #333; }
      
      .time-selection-title { width: 100%; max-width: 90%; font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; text-align: center; }
      .time-button-container { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; width: 100%; max-width: 90%; }
      
      .time-button { 
        background-color: #2d5a4c; color: #efeee7; padding: 8px 12px; border-radius: 6px; 
        font-size: 0.8rem; font-weight: bold; min-width: 70px; border: none; 
        display: flex; justify-content: center; align-items: center; box-sizing: border-box; 
      }

      .section-title { width: 100%; max-width: 90%; font-weight: bold; margin-bottom: 10px; border-left: 5px solid #000; padding-left: 10px; box-sizing: border-box; }
      
      /* ここを修正：1列にするために 1fr に変更しました */
      .container { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 90%; }
      
      .card { background: white; padding: 15px; border-radius: 8px; border: 2px solid #000; display: flex; flex-direction: column; box-sizing: border-box; }
      .title { font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; }
      
      .card-image {
        width: 100%;
        height: 180px; /* 1列になって幅が広がったので、高さも少し大きめに調整 */
        object-fit: cover; 
        border-radius: 6px;
        margin-bottom: 8px;
        border: 1px solid #ddd; 
      }

      .description { font-size: 0.75rem; color: #666; flex-grow: 1; }
      .time-fee-container { display: flex; gap: 5px; margin-top: 10px; }
      .info-badge { flex: 1; padding: 4px; border-radius: 4px; font-size: 0.7rem; background: #e0f2f1; color: #00796b; font-weight: bold; text-align: center; display: flex; justify-content: center; align-items: center; }
      
      .error-log { font-size: 0.6rem; color: red; background: #fee; padding: 5px; margin-top: 5px; border-radius: 5px; display: none; }
    </style>
  </head>
  <body>
    <div class="header-container">
      <img src="ロゴ.png" alt="有福温泉" class="top-logo" />
      <div class="header-title">ARIFUKU PASS</div>
    </div>

    <div class="id-card">
      <div class="photo-frame"><img src="有福温泉.JPG" alt="住民写真" /></div>
      <div class="card-info">
        <div class="info-top-row">
          <p class="user-name" id="line-name">ゲスト 様</p>
          <div class="level-badge">
            <span class="level-label" id="user-title">---</span>
            <div class="stars" id="star-display"></div>
          </div>
        </div>
        <div class="level-description" id="level-description">読込中...</div>
        <div id="res-error" class="error-log"></div>
      </div>
    </div>

    <div class="welcome-message">有福温泉がもっと楽しくなるコンテンツを集めました！<br />湯ったりとした素敵な1日をお過ごしください。</div>

    <div class="time-selection-title">所要時間で選ぶ</div>
    <div class="time-button-container">
      <div class="time-button">〜5分</div>
      <div class="time-button">〜30分</div>
      <div class="time-button">1時間</div>
      <div class="time-button">1時間30分</div>
    </div>

    <div class="section-title">体験メニュー一覧</div>
    <div class="container" id="content-list"><p>読込中...</p></div>
    <div id="list-error" class="error-log" style="max-width:90%"></div>

    <script>
      const LIFF_ID = "2009202315-CpSIZ4ec";
      
      const WORKSHOP_GAS_URL = "https://script.google.com/macros/s/AKfycbzcbW9sTWFjM7f8dqbfa0IvK1Wjx7Rh9c1Ph_rS-VUQrNssFMcLXfzUjtTzcEwztVvOpg/exec";
      const RESIDENT_GAS_URL = "https://script.google.com/macros/s/AKfycbxM22sCEZnNvTouDBWyDaE7WRn4LgNdtd6nqxs-xfggoNRpZzVbvAmTDagbXUtJyaZv/exec";

      async function main() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            document.getElementById("line-name").innerText = profile.displayName + " 様";
          }
        } catch (err) { console.log("LIFF初期化エラー"); }

        // 住民票データの取得
        fetch(RESIDENT_GAS_URL)
          .then(res => res.json())
          .then(data => {
            const list = Array.isArray(data) ? data : (data.rows ? data.rows : []);
            if (list.length > 0) {
              const r = list[0];
              document.getElementById("user-title").innerText = r.title || "---";
              const s = parseInt(r.stars) || 0;
              document.getElementById("star-display").innerText = "★".repeat(s) + "☆".repeat(Math.max(0, 5 - s));
              document.getElementById("level-description").innerText = r.description || "";
            }
          })
          .catch(e => {
            document.getElementById("level-description").innerText = "住民票読込失敗";
            const errDiv = document.getElementById("res-error");
            errDiv.style.display = "block";
            errDiv.innerText = "原因: " + e.message;
          });

        // ワークショップデータの取得
        fetch(WORKSHOP_GAS_URL)
          .then(res => res.json())
          .then(data => {
            const list = Array.isArray(data) ? data : (data.rows ? data.rows : []);
            const container = document.getElementById("content-list");
            container.innerHTML = "";
            list.forEach(item => {
              if (!item.title) return;
              
              const imageHtml = item.image ? `<img src="${item.image}" alt="${item.title}" class="card-image" />` : '';

              container.innerHTML += `
                <div class="card">
                  <div class="title">${item.title}</div>
                  ${imageHtml}
                  <div class="description">${item.description || ""}</div>
                  <div class="time-fee-container">
                    <div class="info-badge">${item.time || "---"}</div>
                    <div class="info-badge">${item.status || "---"}</div>
                  </div>
                </div>`;
            });
          })
          .catch(e => {
            document.getElementById("content-list").innerHTML = "<p>一覧読込失敗</p>";
            const errDiv = document.getElementById("list-error");
            errDiv.style.display = "block";
            errDiv.innerText = "原因: " + e.message;
          });
      }
      main();
    </script>
  </body>
</html>
