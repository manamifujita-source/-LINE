<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>有福温泉 住民アプリ</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: sans-serif;
        background-color: #efeee7;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* 免許証（住民カード）のデザイン */
      .id-card {
        background: #fff;
        border: 3px solid #000;
        border-radius: 20px;
        padding: 15px;
        width: 100%;
        max-width: 400px;
        margin-bottom: 30px;
        box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.1);
      }
      .photo-frame img {
        width: 100%;
        border-radius: 10px;
        border: 2px solid #000;
        display: block;
      }
      .card-info {
        margin-top: 15px;
      }
      .info-top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }
      .user-name {
        font-size: 1.4rem;
        font-weight: bold;
        margin: 0;
      }
      .level-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 2px solid #2d5a4c;
      }
      .level-label {
        color: #2d5a4c;
        font-size: 1rem;
        font-weight: bold;
      }
      .stars {
        color: #2d5a4c;
        font-size: 1rem;
      }
      .level-description {
        font-size: 0.8rem;
        color: #555;
        margin-top: 5px;
        text-align: right;
      }

      /* 体験一覧のデザイン */
      .section-title {
        width: 100%;
        max-width: 800px;
        font-weight: bold;
        margin-bottom: 10px;
        border-left: 5px solid #000;
        padding-left: 10px;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        width: 100%;
        max-width: 800px;
      }
      .card {
        background: white;
        padding: 15px;
        border-radius: 8px;
        border: 2px solid #000;
        display: flex;
        flex-direction: column;
      }
      .title {
        font-weight: bold;
        font-size: 0.9rem;
        margin-bottom: 8px;
      }
      .description {
        font-size: 0.75rem;
        color: #666;
        flex-grow: 1;
      }
      .status {
        margin-top: 10px;
        padding: 4px;
        border-radius: 4px;
        font-size: 0.7rem;
        background: #e0f2f1;
        color: #00796b;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="id-card">
      <div class="photo-frame"><img src="有福温泉.JPG" /></div>
      <div class="card-info">
        <div class="info-top-row">
          <p class="user-name" id="line-name">ゲスト 様</p>
          <div class="level-badge">
            <span class="level-label" id="user-level">読み込み中...</span>
            <div class="stars" id="star-display"></div>
          </div>
        </div>
        <div class="level-description" id="level-detail">
          住民情報を確認中...
        </div>
      </div>
    </div>

    <div class="section-title">体験メニュー一覧</div>

    <div class="container" id="content-list">
      <p>データを読み込み中です...</p>
    </div>

    <script>
      const LIFF_ID = "2009202315-CpSIZ4ec";
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbx1l6X-oxecE7Isic_2DLsDOR7X4AsQRWEOTyrjtgNF4jTlATEwwZtDDvU9DvYcbCS0/exec";

      async function main() {
        // --- LINEログイン & 会員登録処理 ---
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
          const profile = await liff.getProfile();
          document.getElementById("line-name").innerText =
            profile.displayName + " 様";

          // 会員シートに情報を送る（uidとnameをGASへ飛ばす）
          fetch(
            `${GAS_URL}?uid=${profile.userId}&name=${encodeURIComponent(profile.displayName)}`,
          );
        } catch (err) {
          console.error("LIFFエラー:", err);
        }

        // --- スプレッドシートデータ取得 ---
        try {
          const response = await fetch(GAS_URL);
          const data = await response.json();

          // 住民票データの反映（とりあえず1件目）
          if (data.length > 0) {
            const status = data[0];
            document.getElementById("user-level").innerText = status.title;
            document.getElementById("level-detail").innerText =
              status.description;
            document.getElementById("star-display").innerText =
              "★".repeat(status.stars) + "☆".repeat(5 - status.stars);
          }

          // 体験一覧の反映
          const listContainer = document.getElementById("content-list");
          listContainer.innerHTML = "";
          data.forEach((item) => {
            if (!item.title) return;
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                        <div class="title">${item.title}</div>
                        <div class="description">${item.description}</div>
                        <div class="status">${item.status}</div>
                    `;
            listContainer.appendChild(card);
          });
        } catch (error) {
          console.error("データ取得エラー:", error);
        }
      }

      main();
    </script>
  </body>
</html>
